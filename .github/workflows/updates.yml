name: Updates CI
on:
  schedule:
    - cron: "0 3 * * *"
  repository_dispatch:
    types: [updates]
  workflow_dispatch:
permissions: {}
defaults:
  run:
    shell: bash
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  release:
    name: Deploy updates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # Required to push code updates
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 # zizmor: ignore[artipacked]
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Update code
        uses: upptime/updates@edd134de18545d80a4cad1f4114defc47447879a # v1.0.1
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
