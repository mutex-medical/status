    method: POST
    headers:
      - "Content-Type: application/json"
      - "x-api-key: $STATUS_API_KEY"
    body: '{"type":"internal","subdomain":"auth"}'
    expectedStatusCodes:
      - 200

  - name: "[Internal] Storage"
