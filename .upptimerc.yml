status-website:
  # Domain
  cname: status.reze.app

  # Branding
  name: Reze ステータス
  logoUrl: https://raw.githubusercontent.com/mutex-medical/status/refs/heads/main/assets/reze-icon.svg

  # Content
  introTitle: "**Reze** サービスステータス"
  introMessage: |
    Reze の全サービスのステータスをリアルタイムで監視しています。

  # Navigation
  navbar:
    - title: ステータス
      href: /
    - title: ドキュメント
      href: https://docs.reze.app/
    - title: LP
      href: https://lp.reze.app/

  # Theme
  theme: dark

  # Localization
  i18n:
    activeIncidents: "発生中のインシデント"
    allSystemsOperational: "すべてのシステムが正常に稼働しています"
    incidentReport: "インシデント #$NUMBER のレポート →"
    activeIncidentSummary: "$OPENED 前に報告 / 投稿 $POSTS 件"
    footer: "このページは [オープンソース]($REPO) であり、[Upptime](https://upptime.js.org) を利用しています"
    degradedPerformance: "パフォーマンス低下"
    completeOutage: "全面的な障害"
    partialOutage: "部分的な障害"
