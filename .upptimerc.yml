status-website:
  # Domain
  cname: status.reze.app

  # Branding
  name: Reze ステータス
  logoUrl: https://raw.githubusercontent.com/mutex-medical/status/refs/heads/main/assets/reze-icon.svg

  # Content
  introTitle: "**Reze** サービスステータス"
  introMessage: |
    Reze の全サービスのステータスをリアルタイムで監視しています。

  # Navigation
  navbar:
    - title: ステータス
      href: /
    - title: ドキュメント
      href: https://docs.reze.app/
    - title: LP
      href: https://lp.reze.app/

  # Theme
  theme: light

# Localization
# 注意: i18n は status-website 配下ではなくトップレベルに置く必要がある。
# status-page の pre-process がトップレベルの `i18n` のみをデフォルトにマージするため。
