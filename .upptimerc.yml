owner: mutex-medical
repo: status

sites:
  - name: Application
    url: $STATUS_API_ENDPOINT
    method: POST
    headers:
      - "Content-Type: application/json"
      - "x-api-key: $STATUS_API_KEY"
    body: '{"type":"public","subdomain":"app"}'
    expectedStatusCodes:
      - 200

  - name: User API
